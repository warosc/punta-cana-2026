<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <!-- Background sky -->
  <rect width="192" height="192" rx="38" fill="url(#sky)"/>
  <!-- Ocean -->
  <ellipse cx="96" cy="160" rx="110" ry="42" fill="url(#ocean)" opacity="0.9"/>
  <!-- Sand beach -->
  <ellipse cx="96" cy="172" rx="110" ry="30" fill="#fbbf24" opacity="0.8"/>
  <!-- Sun -->
  <circle cx="150" cy="48" r="22" fill="#fde68a" opacity="0.95"/>
  <circle cx="150" cy="48" r="16" fill="#fbbf24"/>
  <!-- Sun rays -->
  <g stroke="#fde68a" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <line x1="150" y1="20" x2="150" y2="14"/>
    <line x1="150" y1="76" x2="150" y2="82"/>
    <line x1="122" y1="48" x2="116" y2="48"/>
    <line x1="178" y1="48" x2="184" y2="48"/>
    <line x1="130" y1="28" x2="126" y2="24"/>
    <line x1="170" y1="68" x2="174" y2="72"/>
    <line x1="170" y1="28" x2="174" y2="24"/>
    <line x1="130" y1="68" x2="126" y2="72"/>
  </g>
  <!-- Palm trunk -->
  <path d="M72 165 Q78 130 85 105 Q88 95 84 80" stroke="#92400e" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Palm leaves -->
  <g fill="#10b981" opacity="0.95">
    <ellipse cx="68" cy="68" rx="28" ry="8" transform="rotate(-30 68 68)"/>
    <ellipse cx="102" cy="62" rx="28" ry="8" transform="rotate(20 102 62)"/>
    <ellipse cx="84" cy="58" rx="24" ry="7" transform="rotate(-10 84 58)"/>
    <ellipse cx="56" cy="80" rx="22" ry="6" transform="rotate(-55 56 80)"/>
    <ellipse cx="114" cy="76" rx="22" ry="6" transform="rotate(45 114 76)"/>
  </g>
  <!-- Coconuts -->
  <circle cx="82" cy="82" r="4" fill="#92400e"/>
  <circle cx="88" cy="78" r="3.5" fill="#78350f"/>
  <!-- Wave lines -->
  <g stroke="white" stroke-width="2" fill="none" opacity="0.4">
    <path d="M20 148 Q35 143 50 148 Q65 153 80 148"/>
    <path d="M100 152 Q118 147 136 152 Q154 157 172 152"/>
  </g>
</svg>
