<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <!-- Background sky -->
  <rect width="512" height="512" rx="100" fill="url(#sky)"/>
  <!-- Ocean -->
  <ellipse cx="256" cy="426" rx="290" ry="112" fill="url(#ocean)" opacity="0.9"/>
  <!-- Sand beach -->
  <ellipse cx="256" cy="460" rx="290" ry="80" fill="#fbbf24" opacity="0.8"/>
  <!-- Sun -->
  <circle cx="400" cy="128" r="58" fill="#fde68a" opacity="0.95"/>
  <circle cx="400" cy="128" r="42" fill="#fbbf24"/>
  <!-- Sun rays -->
  <g stroke="#fde68a" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <line x1="400" y1="55" x2="400" y2="38"/>
    <line x1="400" y1="201" x2="400" y2="218"/>
    <line x1="327" y1="128" x2="310" y2="128"/>
    <line x1="473" y1="128" x2="490" y2="128"/>
    <line x1="348" y1="76" x2="336" y2="64"/>
    <line x1="452" y1="180" x2="464" y2="192"/>
    <line x1="452" y1="76" x2="464" y2="64"/>
    <line x1="348" y1="180" x2="336" y2="192"/>
  </g>
  <!-- Palm trunk -->
  <path d="M192 440 Q208 346 228 280 Q236 253 224 213" stroke="#92400e" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Palm leaves -->
  <g fill="#10b981" opacity="0.95">
    <ellipse cx="182" cy="182" rx="74" ry="21" transform="rotate(-30 182 182)"/>
    <ellipse cx="272" cy="166" rx="74" ry="21" transform="rotate(20 272 166)"/>
    <ellipse cx="224" cy="154" rx="64" ry="18" transform="rotate(-10 224 154)"/>
    <ellipse cx="150" cy="213" rx="58" ry="16" transform="rotate(-55 150 213)"/>
    <ellipse cx="304" cy="202" rx="58" ry="16" transform="rotate(45 304 202)"/>
  </g>
  <!-- Coconuts -->
  <circle cx="220" cy="218" r="10" fill="#92400e"/>
  <circle cx="234" cy="208" r="9" fill="#78350f"/>
  <!-- Wave lines -->
  <g stroke="white" stroke-width="4" fill="none" opacity="0.4">
    <path d="M54 394 Q92 381 132 394 Q172 407 212 394"/>
    <path d="M268 406 Q316 393 362 406 Q408 419 456 406"/>
  </g>
  <!-- Stars (decorative, evoke tropical nights) -->
  <g fill="white" opacity="0.6">
    <circle cx="50" cy="60" r="2.5"/>
    <circle cx="120" cy="35" r="2"/>
    <circle cx="80" cy="90" r="1.5"/>
    <circle cx="170" cy="55" r="2"/>
    <circle cx="45" cy="120" r="1.5"/>
  </g>
</svg>
